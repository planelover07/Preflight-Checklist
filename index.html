<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Safety Checklist</title>
<!-- Aircraft illustration: "1971 Cessna 150" (c) 2022 TaraJNeal, from user-supplied file -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0c0e;
    --panel: #14171a;
    --panel-raised: #1b1f23;
    --hairline: #2a2f34;
    --silver: #9aa4ac;
    --silver-bright: #d6dce1;
    --white: #f2f5f7;
    --red: #e25555;
    --red-dim: #a04a4a;
    --green: #6fae7d;
  }

  * { box-sizing: border-box; }

  html, body { overflow-x: hidden; }

  body {
    margin: 0;
    background: radial-gradient(ellipse at top, #12151a 0%, #08090b 70%);
    color: var(--white);
    font-family: 'IBM Plex Sans', sans-serif;
    min-height: 100vh;
    padding: 80px 16px 88px;
  }

  .wrap { max-width: 640px; margin: 0 auto; }

  /* ---- Header / Gauge ---- */
  header {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 20px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--hairline);
  }

  .gauge { position: relative; width: 84px; height: 84px; flex-shrink: 0; }
  .gauge svg { transform: rotate(-90deg); }
  .gauge circle.track { fill: none; stroke: #202429; stroke-width: 6; }
  .gauge circle.fill {
    fill: none;
    stroke: var(--silver-bright);
    stroke-width: 6;
    stroke-linecap: round;
    transition: stroke-dashoffset 0.4s ease, stroke 0.4s ease;
  }
  .gauge-label { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; flex-direction: column; }
  .gauge-num { font-family: 'IBM Plex Mono', monospace; font-size: 20px; font-weight: 500; color: var(--white); line-height: 1; }
  .gauge-den { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--silver); letter-spacing: 0.05em; }

  .title-block h1 { font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 26px; letter-spacing: 0.02em; margin: 0 0 4px; color: var(--white); }
  .title-block p { margin: 0; font-size: 12.5px; color: var(--silver); letter-spacing: 0.03em; }

  /* ---- Resource links ---- */
  .resources { display: flex; gap: 8px; flex-wrap: wrap; margin: 0 0 22px; }
  .res-chip {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.04em;
    color: var(--silver-bright);
    text-decoration: none;
    border: 1px solid rgba(111, 174, 125, 0.55);
    background: var(--panel);
    padding: 8px 12px;
    border-radius: 6px;
    display: inline-flex;
    align-items: center;
    gap: 7px;
    transition: all 0.15s ease;
    -webkit-tap-highlight-color: transparent;
  }
  .res-chip:hover { border-color: var(--green); color: var(--white); }
  .res-chip .arrow { color: var(--green); font-size: 10px; }

  /* ---- Sections ---- */
  .section {
    position: relative;
    margin-bottom: 22px;
    background: var(--panel);
    border: 1px solid var(--hairline);
    border-radius: 10px;
    overflow: hidden;
  }

  .section-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 13px 16px;
    background: var(--panel-raised);
    border-bottom: 1px solid var(--hairline);
  }

  .section-head-left { display: flex; align-items: center; gap: 10px; }

  .section-tag {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: #0a0c0e;
    background: var(--silver-bright);
    padding: 2px 7px;
    border-radius: 4px;
    font-weight: 500;
    letter-spacing: 0.04em;
    transition: background 0.3s ease;
  }

  .section-head h2 {
    font-family: 'Rajdhani', sans-serif;
    font-size: 16.5px;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    margin: 0;
    color: var(--silver-bright);
  }

  .head-right { display: flex; align-items: center; gap: 10px; }

  .section-count { font-family: 'IBM Plex Mono', monospace; font-size: 11.5px; color: var(--silver); transition: color 0.3s ease; }

  .checkall {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.05em;
    color: var(--silver);
    background: transparent;
    border: 1px solid var(--hairline);
    border-radius: 4px;
    padding: 5px 9px;
    cursor: pointer;
    transition: all 0.15s ease;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }
  .checkall:hover { color: var(--white); border-color: var(--silver); }

  .section.complete .section-tag { background: var(--green); }
  .section.complete .section-count { color: var(--green); }
  .section.complete .checkall { color: var(--green); border-color: rgba(111, 174, 125, 0.4); }

  .items { padding: 6px 0; }

  .item {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 13px 16px;
    min-height: 48px;
    border-bottom: 1px solid #1c2024;
    cursor: pointer;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
    transition: background 0.15s ease, opacity 0.25s ease;
  }

  .item:last-child { border-bottom: none; }
  .item:hover { background: #191d21; }

  .checkbox {
    width: 24px;
    height: 24px;
    border-radius: 6px;
    border: 1.5px solid var(--silver);
    flex-shrink: 0;
    margin-top: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s ease;
    background: #101316;
  }

  .checkbox svg { width: 14px; height: 14px; opacity: 0; transition: opacity 0.12s ease; }

  .item.critical .checkbox { border-color: var(--red-dim); }

  .item.checked { opacity: 0.45; }
  .item.checked:hover { opacity: 0.7; }
  .item.checked .checkbox { background: var(--green); border-color: var(--green); }
  .item.checked .checkbox svg { opacity: 1; }
  .item.checked .checkbox svg path { stroke: #0a0c0e; }

  .item-text { flex: 1; padding-top: 2px; }

  .item-label { font-size: 14.5px; color: var(--white); line-height: 1.4; transition: color 0.15s ease; }

  .item.checked .item-label {
    color: var(--silver);
    text-decoration: line-through;
    text-decoration-color: #3a4046;
  }

  .item-note { font-size: 12px; color: var(--silver); margin-top: 2px; line-height: 1.4; }

  .item.critical { box-shadow: inset 2px 0 0 var(--red-dim); }
  .item.critical .item-note { color: var(--red-dim); }

  .critical-flag {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9.5px;
    color: var(--red);
    border: 1px solid var(--red-dim);
    padding: 1px 5px;
    border-radius: 3px;
    letter-spacing: 0.06em;
    margin-left: 8px;
    white-space: nowrap;
  }

  .item-label-row { display: flex; align-items: center; flex-wrap: wrap; gap: 4px; }

  /* ---- Cessna 150 (illustration + spinning prop) ---- */
  .c150-wrap { position: relative; width: 100%; }
  .c150-wrap img { display: block; width: 100%; height: auto; -webkit-user-drag: none; pointer-events: none; }
  .c150-prop { position: absolute; inset: 0; animation: propFlick 0.1s linear infinite; filter: blur(0.4px); }

  @keyframes propFlick {
    0%, 100% { transform: scaleY(1); opacity: 0.92; }
    50%      { transform: scaleY(0.16); opacity: 0.4; }
  }

  .prop-shimmer {
    position: absolute;
    width: 7%;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    background: radial-gradient(ellipse at center, rgba(214, 220, 225, 0.28), rgba(214, 220, 225, 0) 68%);
    pointer-events: none;
  }

  /* ---- Runways: dedicated strips at top and bottom of screen ---- */
  .runway {
    position: fixed;
    left: 0;
    right: 0;
    height: 60px;
    z-index: 45;
    pointer-events: none;
    background: linear-gradient(180deg, #0e1114, #0a0c0e);
    overflow: hidden;
  }
  .runway-top { top: 0; border-bottom: 1px solid var(--hairline); }
  .runway-bottom { bottom: 0; border-top: 1px solid var(--hairline); }

  .runway::before {
    content: '';
    position: absolute;
    left: 0; right: 0;
    bottom: 5px;
    height: 15px;
    background: #14171b;
    border-top: 1px solid #24282d;
    border-bottom: 1px solid #24282d;
  }

  .runway::after {
    content: '';
    position: absolute;
    left: 0; right: 0;
    bottom: 11px;
    height: 2px;
    background: repeating-linear-gradient(90deg,
      rgba(214, 220, 225, 0.5) 0 24px,
      transparent 24px 52px);
  }

  .patrol {
    position: absolute;
    left: 0;
    bottom: 10px;
    width: 96px;
    z-index: 2;
    filter: drop-shadow(0 3px 6px rgba(0, 0, 0, 0.5));
    will-change: transform;
    animation: patrol 26s linear infinite;
  }
  .runway-bottom .patrol { animation-duration: 34s; animation-delay: -17s; }

  @keyframes patrol {
    0%    { transform: translateX(-120px) scaleX(1); }
    48.5% { transform: translateX(100vw) scaleX(1); }
    51.5% { transform: translateX(100vw) scaleX(-1); }
    98.5% { transform: translateX(-120px) scaleX(-1); }
    100%  { transform: translateX(-120px) scaleX(1); }
  }

  /* ---- Takeoff celebration ---- */
  .takeoff-plane {
    position: fixed;
    left: -230px;
    bottom: 14%;
    width: 210px;
    z-index: 60;
    pointer-events: none;
    opacity: 0;
  }
  .takeoff-plane.fly { animation: takeoff 3.6s cubic-bezier(0.3, 0.1, 0.4, 1) forwards; }

  @keyframes takeoff {
    0%   { transform: translate(0, 0) rotate(0deg); opacity: 0; }
    8%   { opacity: 1; }
    45%  { transform: translate(58vw, -8vh) rotate(-7deg); }
    90%  { opacity: 1; }
    100% { transform: translate(140vw, -46vh) rotate(-12deg); opacity: 0; }
  }

  /* ---- FLY SAFE ---- */
  .flysafe {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    gap: 28px;
    align-items: center;
    justify-content: center;
    z-index: 70;
    pointer-events: none;
    opacity: 0;
  }
  .flysafe.show { animation: flysafeCycle 3.6s ease 0.7s both; }

  @keyframes flysafeCycle {
    0%   { opacity: 0; }
    12%  { opacity: 1; }
    80%  { opacity: 1; }
    100% { opacity: 0; }
  }

  .fs-inner { position: relative; display: flex; }
  .fs-inner::after {
    content: '';
    position: absolute;
    left: 8%;
    right: 8%;
    bottom: -14px;
    height: 2px;
    border-radius: 2px;
    background: linear-gradient(90deg, transparent, var(--green), transparent);
    transform: scaleX(0);
  }
  .flysafe.show .fs-inner::after { animation: lineSweep 0.8s 1.6s cubic-bezier(0.2, 0.7, 0.3, 1) both; }
  @keyframes lineSweep { to { transform: scaleX(1); } }

  .fs-letter {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: clamp(46px, 11vw, 92px);
    letter-spacing: 0.14em;
    color: var(--white);
    text-shadow: 0 0 26px rgba(214, 220, 225, 0.35);
    opacity: 0;
    transform: translateY(28px);
    filter: blur(8px);
  }
  .fs-space { width: 0.5em; }
  .flysafe.show .fs-letter { animation: letterIn 0.55s cubic-bezier(0.2, 0.7, 0.3, 1) both; }

  @keyframes letterIn {
    to { opacity: 1; transform: translateY(0); filter: blur(0); }
  }

  .fs-tagline {
    font-family: 'IBM Plex Mono', monospace;
    font-size: clamp(11px, 3vw, 15px);
    letter-spacing: 0.24em;
    color: var(--silver);
    opacity: 0;
    transform: translateY(14px);
  }
  .flysafe.show .fs-tagline { animation: letterIn 0.6s 1.9s cubic-bezier(0.2, 0.7, 0.3, 1) both; }

  /* ---- Footer ---- */
  footer { margin-top: 8px; text-align: center; }

  .reset-btn {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--silver);
    background: transparent;
    border: 1px solid var(--hairline);
    padding: 10px 22px;
    border-radius: 6px;
    cursor: pointer;
    letter-spacing: 0.04em;
    transition: all 0.15s ease;
    -webkit-tap-highlight-color: transparent;
  }
  .reset-btn:hover { color: var(--white); border-color: var(--silver); }

  .complete-banner {
    margin-top: 18px;
    padding: 14px;
    border: 1px solid #3a4a3d;
    background: #10160f;
    border-radius: 8px;
    text-align: center;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12.5px;
    color: var(--green);
    letter-spacing: 0.04em;
    display: none;
  }
  .complete-banner.show { display: block; }

  .disclaimer {
    margin-top: 24px;
    font-size: 11px;
    color: #565c62;
    text-align: center;
    line-height: 1.6;
    padding: 0 12px;
  }

  /* ---- Mobile ---- */
  @media (max-width: 480px) {
    body { padding: 68px 10px 76px; }
    header { gap: 14px; }
    .gauge { width: 68px; height: 68px; }
    .gauge-num { font-size: 17px; }
    .gauge-den { font-size: 9px; }
    .title-block h1 { font-size: 21px; }
    .title-block p { font-size: 11.5px; }
    .resources { gap: 6px; }
    .res-chip { flex: 1; justify-content: center; padding: 9px 6px; font-size: 10.5px; }
    .section { margin-bottom: 16px; }
    .section-head { padding: 11px 13px; }
    .section-head h2 { font-size: 14px; letter-spacing: 0.03em; }
    .head-right { gap: 7px; }
    .checkall { padding: 5px 7px; font-size: 9.5px; }
    .item { padding: 13px 13px; }
    .item-label { font-size: 15px; }
    .item-note { font-size: 12.5px; }
    .runway { height: 52px; }
    .patrol { width: 78px; }
    .takeoff-plane { width: 150px; left: -170px; }
  }

  @media (prefers-reduced-motion: reduce) {
    .runway, .takeoff-plane { display: none; }
    .c150-prop { animation: none; }
    .flysafe.show { animation: none; opacity: 1; }
    .flysafe.show .fs-letter { animation: none; opacity: 1; transform: none; filter: none; }
    .flysafe.show .fs-tagline { animation: none; opacity: 1; transform: none; }
    .flysafe.show .fs-inner::after { animation: none; transform: scaleX(1); }
  }
</style>
</head>

<div class="wrap">

  <header>
    <div class="gauge">
      <svg width="100%" height="100%" viewBox="0 0 84 84">
        <circle class="track" cx="42" cy="42" r="36" />
        <circle id="fillRing" class="fill" cx="42" cy="42" r="36"
                stroke-dasharray="226.19" stroke-dashoffset="226.19" />
      </svg>

        <div class="gauge-num" id="gaugeNum">0</div>
        <div class="gauge-den" id="gaugeDen">/ 0</div>
      </div>
    </div>
    <div class="title-block">

  <nav class="resources" aria-label="Pilot resources">

    <a class="res-chip" href="https://nasstatus.faa.gov/" target="_blank" rel="noopener noreferrer" title="nasstatus.faa.gov">ATC DELAYS <span class="arrow">&#8599;</span></a>

  <div id="sections"></div>

</div>

<div class="runway runway-top" aria-hidden="true"><div class="patrol" id="patrolTop"></div></div>
<div class="runway runway-bottom" aria-hidden="true"><div class="patrol" id="patrolBottom"></div></div>
<div class="takeoff-plane" id="takeoffPlane" aria-hidden="true"></div>
<div class="flysafe" id="flySafe" aria-hidden="true"><div class="fs-inner" id="fsInner"></div><div class="fs-tagline">DON'T BECOME A STATISTIC</div></div>

<script>
const DATA = [
  {
    tag: "01",

      { label: "I am current and proficient for these conditions, not just legal", note: "Recency \u2260 proficiency \u2014 be honest with yourself", critical: true },
      { label: "IMSAFE check: Illness, Medication, Stress, Alcohol, Fatigue, Emotion", note: "Any red flag here is grounds to scrub the flight", critical: true },

  {

      { label: "Survival/emergency gear appropriate for terrain and route" }

// Cessna 150 illustration: static airframe layer + separate prop layer that flickers like a spinning blade

  </div>`;

document.getElementById('patrolTop').innerHTML = PLANE_HTML;
document.getElementById('patrolBottom').innerHTML = PLANE_HTML;
const takeoffEl = document.getElementById('takeoffPlane');
takeoffEl.innerHTML = PLANE_HTML;

// Build FLY SAFE letters
const fsInner = document.getElementById('fsInner');
'FLY SAFE'.split('').forEach((ch, i) => {
  const s = document.createElement('span');
  if (ch === ' ') { s.className = 'fs-space'; }
  else {
    s.className = 'fs-letter';
    s.textContent = ch;
    s.style.animationDelay = (0.8 + i * 0.07) + 's';
  }
  fsInner.appendChild(s);
});
const flySafeEl = document.getElementById('flySafe');

const container = document.getElementById('sections');
const state = {};
const flatOrder = [];

DATA.forEach((section, sIdx) => {
  section.items.forEach((_, iIdx) => {
    state[`${sIdx}-${iIdx}`] = false;
    flatOrder.push([sIdx, iIdx]);
  });

  const sectionEl = document.createElement('div');
  sectionEl.className = 'section';
  sectionEl.id = `section-${sIdx}`;

  const head = document.createElement('div');
  head.className = 'section-head';
  head.innerHTML = `
    <div class="section-head-left">
      <span class="section-tag">${section.tag}</span>
      <h2>${section.name}</h2>
    </div>
    <div class="head-right">
      <span class="section-count" id="count-${sIdx}">0/${section.items.length}</span>
      <button class="checkall" id="checkall-${sIdx}">CHECK ALL</button>
    </div>
  `;
  sectionEl.appendChild(head);

  const itemsEl = document.createElement('div');
  itemsEl.className = 'items';

  section.items.forEach((item, iIdx) => {
    const row = document.createElement('div');
    row.className = 'item' + (item.critical ? ' critical' : '');
    row.id = `item-${sIdx}-${iIdx}`;
    row.innerHTML = `
      <div class="checkbox">
        <svg viewBox="0 0 12 12" fill="none">
          <path d="M1.5 6L4.5 9L10.5 2" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="item-text">
        <div class="item-label-row">
          <span class="item-label">${item.label}</span>
          ${item.critical ? '<span class="critical-flag">CRITICAL</span>' : ''}
        </div>
        ${item.note ? `<div class="item-note">${item.note}</div>` : ''}
      </div>
    `;
    row.addEventListener('click', () => toggleItem(sIdx, iIdx));
    itemsEl.appendChild(row);
  });

  sectionEl.appendChild(itemsEl);
  container.appendChild(sectionEl);
});

// Wire check-all buttons (after all sections exist in the DOM)
DATA.forEach((_, sIdx) => {
  document.getElementById(`checkall-${sIdx}`).addEventListener('click', () => checkAllSection(sIdx));
});

const totalItems = flatOrder.length;
const fillRing = document.getElementById('fillRing');
const CIRC = 226.19;
const sectionComplete = {};
let allComplete = false;
let flySafeTimer = null;

function setItem(sIdx, iIdx, value) {
  state[`${sIdx}-${iIdx}`] = value;
  document.getElementById(`item-${sIdx}-${iIdx}`).classList.toggle('checked', value);
}

function toggleItem(sIdx, iIdx) {
  const nowChecked = !state[`${sIdx}-${iIdx}`];
  setItem(sIdx, iIdx, nowChecked);
  updateCounts();
  if (nowChecked) {
    setTimeout(() => scrollToNextUnchecked(sIdx, iIdx), 220);
  }
}

function checkAllSection(sIdx) {
  const n = DATA[sIdx].items.length;
  const allChecked = DATA[sIdx].items.every((_, i) => state[`${sIdx}-${i}`]);
  for (let i = 0; i < n; i++) setItem(sIdx, i, !allChecked);
  updateCounts();
  if (!allChecked) {
    setTimeout(() => scrollToNextUnchecked(sIdx, n - 1), 220);
  }
}

function scrollToNextUnchecked(fromS, fromI) {
  const idx = flatOrder.findIndex(([s, i]) => s === fromS && i === fromI);
  const order = flatOrder.slice(idx + 1).concat(flatOrder.slice(0, idx));
  for (const [s, i] of order) {
    if (!state[`${s}-${i}`]) {
      document.getElementById(`item-${s}-${i}`)
        .scrollIntoView({ behavior: 'smooth', block: 'center' });
      return;
    }
  }
  // Nothing left unchecked: the takeoff celebration handles it
}

function updateCounts() {
  let totalChecked = 0;
  DATA.forEach((section, sIdx) => {
    let sectionChecked = 0;
    section.items.forEach((_, iIdx) => {
      if (state[`${sIdx}-${iIdx}`]) { sectionChecked++; totalChecked++; }
    });
    document.getElementById(`count-${sIdx}`).textContent = `${sectionChecked}/${section.items.length}`;

    const isComplete = sectionChecked === section.items.length;
    sectionComplete[sIdx] = isComplete;
    document.getElementById(`section-${sIdx}`).classList.toggle('complete', isComplete);
    document.getElementById(`checkall-${sIdx}`).textContent = isComplete ? 'CLEAR' : 'CHECK ALL';
  });

  document.getElementById('gaugeNum').textContent = totalChecked;
  document.getElementById('gaugeDen').textContent = `/ ${totalItems}`;

  const pct = totalChecked / totalItems;
  fillRing.style.strokeDashoffset = CIRC - (CIRC * pct);
  fillRing.style.stroke = pct === 1 ? '#6fae7d' : '#d6dce1';

  document.getElementById('completeBanner').classList.toggle('show', pct === 1);

  if (pct === 1 && !allComplete) launchCelebration();
  allComplete = pct === 1;
}

function launchCelebration() {
  takeoffEl.classList.remove('fly');
  void takeoffEl.offsetWidth;
  takeoffEl.classList.add('fly');

  flySafeEl.classList.remove('show');
  void flySafeEl.offsetWidth;
  flySafeEl.classList.add('show');

  // Fallback (covers reduced-motion, where the CSS animation never fires animationend)
  clearTimeout(flySafeTimer);
  flySafeTimer = setTimeout(() => flySafeEl.classList.remove('show'), 4800);
}

takeoffEl.addEventListener('animationend', (e) => {
  if (e.target === takeoffEl && e.animationName === 'takeoff') takeoffEl.classList.remove('fly');
});
flySafeEl.addEventListener('animationend', (e) => {
  if (e.animationName === 'flysafeCycle') {
    flySafeEl.classList.remove('show');
    clearTimeout(flySafeTimer);
  }
});

document.getElementById('resetBtn').addEventListener('click', () => {
  flatOrder.forEach(([s, i]) => setItem(s, i, false));
  updateCounts();
  window.scrollTo({ top: 0, behavior: 'smooth' });
});

updateCounts();
</script>
